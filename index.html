<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>找數</title>
    
    <link rel="apple-touch-icon" href="https://github.com/HugoTCY/Jausou/blob/eb37fbdc4b6942fba1e79d390bac1bdd9d3b722e/Screenshot_20260402_064835_Google.png">
    <link rel="icon" href="https://github.com/HugoTCY/Jausou/blob/eb37fbdc4b6942fba1e79d390bac1bdd9d3b722e/Screenshot_20260402_064835_Google.png">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .app-title { font-weight: 900; background: linear-gradient(to bottom, #ffffff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4)); letter-spacing: 6px; }
        .glass-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        
        /* 彈出計數機面板 (B款視覺) */
        .calc-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #111827; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 30px 30px 0 0; z-index: 50; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); max-height: 85vh; overflow-y: auto; }
        .calc-panel.active { transform: translateY(0); }
        .calc-btn { background: rgba(255,255,255,0.03); height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 1.1rem; font-weight: 300; }
        .calc-btn:active { background: rgba(255,255,255,0.15); }
        .calc-btn.op { color: #818cf8; }
        .calc-btn.ok { background: #4f46e5; font-weight: 700; }
        
        .member-chip { padding: 10px; border-radius: 12px; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); transition: all 0.2s; text-align: center; }
        .member-chip:active { background: #6366f1; border-color: #6366f1; }
        
        input, select { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="app" class="max-w-md mx-auto px-5">
        <header class="pt-16 pb-8 text-center"><h1 class="app-title text-6xl text-white">找數</h1></header>

        <div class="space-y-6">
            <section class="glass-card p-4 flex justify-between items-center text-[10px] opacity-50">
                <select v-model="foreignCurrency" @change="fetchRate" class="bg-transparent outline-none">
                    <option value="JPY">🇯🇵 JPY</option><option value="KRW">🇰🇷 KRW</option><option value="TWD">🇹🇼 TWD</option>
                </select>
                <span class="font-mono">Rate: {{exchangeRate}}</span>
            </section>

            <section class="glass-card p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-black opacity-30 tracking-widest uppercase">New Expense</span>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] opacity-40">累加模式</span>
                        <button @click="isAccumulate = !isAccumulate" :class="['w-10 h-5 rounded-full relative transition-all', isAccumulate ? 'bg-indigo-600' : 'bg-white/10']">
                            <div :class="['absolute top-1 w-3 h-3 bg-white rounded-full transition-all', isAccumulate ? 'left-6' : 'left-1']"></div>
                        </button>
                    </div>
                </div>

                <div class="relative mb-6">
                    <input type="number" v-model="expense.amount" readonly @click="showCalc = true" placeholder="0" class="w-full p-6 rounded-[24px] text-5xl font-bold text-center bg-transparent border border-white/10 outline-none cursor-pointer">
                    <div v-if="isAccumulate && customSplits.length > 0" class="mt-4 space-y-1 border-t border-white/5 pt-3">
                        <div v-for="(s, index) in customSplits" :key="index" class="flex justify-between text-[11px] font-light">
                            <span class="opacity-40">{{s.name}}</span>
                            <span class="text-indigo-300">{{s.amount}} {{foreignCurrency}}</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <input type="text" v-model="expense.desc" placeholder="項目內容 (e.g. 燒肉)" class="w-full p-4 rounded-xl text-sm outline-none">
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                        <span class="text-[10px] opacity-40 uppercase font-bold">誰付款？</span>
                        <select v-model="expense.payer" class="bg-transparent font-bold text-sm outline-none">
                            <option v-for="m in members" :value="m">{{m}}</option>
                        </select>
                    </div>
                </div>

                <button @click="addRecord" class="w-full mt-6 bg-gradient-to-r from-indigo-600 to-purple-600 py-4 rounded-2xl font-bold active:scale-95 transition-all">確認入數</button>
            </section>

            <section class="glass-card p-6">
                <h3 class="text-[10px] opacity-30 font-black mb-4 uppercase tracking-widest">Members</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" v-model="newMemberName" @keyup.enter="addMember" placeholder="輸入名單" class="flex-1 p-3 rounded-xl text-xs outline-none">
                    <button @click="addMember" class="bg-white/10 px-4 rounded-xl text-xs font-bold">新增</button>
                </div>
                <div class="flex flex-wrap gap-2">
                    <span v-for="(m, i) in members" :key="i" class="text-[11px] bg-white/5 border border-white/10 px-3 py-1.5 rounded-lg flex items-center">
                        {{m}} <button @click="members.splice(i, 1)" class="ml-2 opacity-20">×</button>
                    </span>
                </div>
            </section>

            </div>

        <div :class="['calc-panel p-6 shadow-2xl', showCalc ? 'active' : '']">
            <div class="flex justify-between items-center mb-6">
                <div class="text-3xl font-mono text-indigo-400">{{ calcDisplay || '0' }}</div>
                <button @click="showCalc = false" class="text-[10px] font-bold opacity-30 border border-white/20 px-3 py-1 rounded-full uppercase">Done</button>
            </div>

            <div v-if="isAccumulate" class="mb-6">
                <p class="text-[10px] opacity-30 mb-3 uppercase font-black">點擊團友名稱即時分賬</p>
                <div v-if="members.length === 0" class="text-[11px] opacity-20 italic">請先在主介面新增團友</div>
                <div class="grid grid-cols-3 gap-2">
                    <button v-for="m in members" :key="m" @click="assignToMember(m)" class="member-chip">
                        {{m}}
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <button v-for="b in ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','C','+']" 
                        @click="calcInput(b)" class="calc-btn" :class="{op: isNaN(b)}">{{b}}</button>
                <button @click="calcResult" class="calc-btn col-span-2 op">=</button>
                <button @click="closeCalc" class="calc-btn ok col-span-2">OK</button>
            </div>
        </div>
        <div v-if="showCalc" @click="showCalc = false" class="fixed inset-0 bg-black/60 z-40 backdrop-blur-sm"></div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    foreignCurrency: 'JPY', baseCurrency: 'HKD', exchangeRate: 0.052,
                    members: [], newMemberName: '', history: [],
                    expense: { amount: 0, desc: '', payer: '', participants: [] },
                    showCalc: false, calcDisplay: '', isAccumulate: false, customSplits: []
                }
            },
            mounted() {
                this.fetchRate();
                const m = localStorage.getItem('jausou_v10_mems'); if (m) this.members = JSON.parse(m);
                if (this.members.length > 0) this.expense.payer = this.members[0];
            },
            methods: {
                calcInput(b) { b === 'C' ? this.calcDisplay = '' : this.calcDisplay += b; },
                calcResult() { try { this.calcDisplay = eval(this.calcDisplay.replace(/×/g, '*').replace(/÷/g, '/')).toString(); } catch { this.calcDisplay = 'Error'; } },
                
                assignToMember(name) {
                    this.calcResult();
                    if (this.calcDisplay === 'Error' || !this.calcDisplay) return;
                    const val = parseFloat(this.calcDisplay);
                    this.customSplits.push({ name, amount: val });
                    this.expense.amount = this.customSplits.reduce((a, b) => a + b, 0);
                    this.calcDisplay = ''; // 清零準備入下一個
                },

                closeCalc() {
                    this.calcResult();
                    if (!this.isAccumulate && this.calcDisplay !== 'Error') {
                        this.expense.amount = parseFloat(this.calcDisplay || 0);
                    }
                    this.showCalc = false;
                },

                addMember() {
                    if (this.newMemberName && !this.members.includes(this.newMemberName)) {
                        this.members.push(this.newMemberName);
                        if (this.members.length === 1) this.expense.payer = this.newMemberName;
                        this.newMemberName = '';
                    }
                },

                addRecord() {
                    if (this.expense.amount <= 0 || !this.expense.payer) return alert("入數呀！");
                    this.history.unshift({
                        ...this.expense,
                        splits: [...this.customSplits],
                        timestamp: new Date().toLocaleTimeString(),
                        rate: this.exchangeRate
                    });
                    this.expense.amount = 0; this.expense.desc = ''; this.customSplits = [];
                    localStorage.setItem('jausou_v10_hist', JSON.stringify(this.history));
                },

                async fetchRate() {
                    try {
                        const res = await fetch(`https://open.er-api.com/v6/latest/${this.foreignCurrency}`);
                        const data = await res.json();
                        this.exchangeRate = data.rates[this.baseCurrency].toFixed(5);
                    } catch (e) { console.error("Rate API Error"); }
                }
            },
            watch: {
                members: { handler(v) { localStorage.setItem('jausou_v10_mems', JSON.stringify(v)); }, deep: true }
            }
        }).mount('#app')
    </script>
</body>
</html>
