<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jausou</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* 標題專用字體 */
        .app-title { font-family: 'Montserrat', sans-serif; letter-spacing: -1px; }
        .glass-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.5);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">
    <div id="app" class="max-w-md mx-auto">
        
        <header class="glass-header text-white pt-12 pb-10 px-6 rounded-b-[40px] mb-8 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white opacity-10 rounded-full"></div>
            <div class="absolute top-20 -left-10 w-24 h-24 bg-white opacity-5 rounded-full"></div>
            
            <h1 class="app-title text-5xl font-black text-center mb-1">Jausou</h1>
            <div class="w-12 h-1 bg-white/30 mx-auto rounded-full"></div>
        </header>

        <div class="px-5 space-y-6">
            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-slate-400 text-xs font-bold uppercase tracking-wider">Exchange Rate</h2>
                    <div class="flex items-center space-x-2">
                        <span class="text-[10px] text-slate-400">Manual</span>
                        <input type="checkbox" v-model="isCustomRate" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <select v-model="foreignCurrency" class="bg-slate-50 p-3 rounded-2xl text-sm font-bold text-slate-600 outline-none border border-transparent focus:border-indigo-200 transition-all">
                        <option value="JPY">🇯🇵 JPY</option>
                        <option value="KRW">🇰🇷 KRW</option>
                        <option value="TWD">🇹🇼 TWD</option>
                        <option value="THB">🇹🇭 THB</option>
                    </select>
                    <select v-model="baseCurrency" class="bg-slate-50 p-3 rounded-2xl text-sm font-bold text-slate-600 outline-none border border-transparent focus:border-indigo-200 transition-all">
                        <option value="HKD">🇭🇰 HKD</option>
                    </select>
                </div>
                <div class="relative">
                    <input type="number" v-model="exchangeRate" :readonly="!isCustomRate" 
                           class="w-full p-4 rounded-2xl font-mono text-xl text-center transition-all outline-none border-2" 
                           :class="isCustomRate ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-slate-50 border-transparent text-slate-500'"
                           step="0.000001">
                </div>
            </section>

            <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-4">Members</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" v-model="newMember" @keyup.enter="addMember" placeholder="名" class="flex-1 bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                    <button @click="addMember" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold shadow-lg shadow-indigo-200">加</button>
                </div>
                <div class="flex flex-wrap gap-2">
                    <span v-for="(m, i) in members" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-sm font-bold flex items-center group">
                        {{ m }}
                        <button @click="members.splice(i,1)" class="ml-2 text-slate-300 hover:text-red-500 transition-colors">✕</button>
                    </span>
                </div>
            </section>

            <section class="bg-white p-6 rounded-[32px] shadow-md border border-indigo-50">
                <div class="flex items-center justify-center space-x-2 mb-6">
                    <div class="w-2 h-2 bg-indigo-500 rounded-full"></div>
                    <h2 class="font-bold text-slate-800">新增消費</h2>
                    <div class="w-2 h-2 bg-indigo-500 rounded-full"></div>
                </div>
                <div class="space-y-5">
                    <div class="relative group">
                        <span class="absolute left-5 top-5 text-slate-300 font-black text-xl transition-colors group-focus-within:text-indigo-400">{{foreignCurrency}}</span>
                        <input type="number" v-model="expense.amount" placeholder="0" class="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-100 rounded-3xl p-5 pl-20 text-3xl font-black outline-none transition-all">
                    </div>
                    
                    <input type="text" v-model="expense.desc" placeholder="項目內容" class="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-100 rounded-2xl p-4 outline-none transition-all">
                    
                    <div class="space-y-3">
                        <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest ml-2">Payer</label>
                        <select v-model="expense.payer" class="w-full bg-slate-50 p-4 rounded-2xl text-sm font-bold text-slate-700 outline-none">
                            <option v-for="m in members" :value="m">{{m}}</option>
                        </select>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center block">Participants</label>
                        <div class="flex flex-wrap gap-2 justify-center">
                            <button v-for="m in members" @click="toggleParticipant(m)" 
                                    :class="['px-5 py-2 rounded-2xl border-2 transition-all font-bold text-sm', expense.participants.includes(m) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-105' : 'bg-white text-slate-400 border-slate-100']">
                                {{m}}
                            </button>
                        </div>
                    </div>

                    <button @click="addRecord" class="w-full bg-indigo-600 text-white py-5 rounded-[24px] font-black text-lg shadow-xl shadow-indigo-100 active:scale-95 transition-all mt-4">
                        CONFIRM
                    </button>
                </div>
            </section>

            <section v-if="history.length > 0" class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold text-slate-800 text-xl italic">Settlement</h2>
                    <button @click="history=[]" class="text-[10px] font-bold text-red-300 uppercase tracking-tighter hover:text-red-500 transition-colors">Clear All</button>
                </div>
                
                <div class="space-y-4">
                    <div v-for="s in settlement" class="flex justify-between items-center p-5 bg-indigo-50/50 rounded-3xl border border-indigo-100/50">
                        <div class="flex items-center space-x-3">
                            <span class="font-black text-slate-700">{{s.from}}</span>
                            <div class="w-6 h-[2px] bg-indigo-200"></div>
                            <span class="font-black text-slate-700">{{s.to}}</span>
                        </div>
                        <div class="text-right">
                            <span class="block text-[10px] text-indigo-400 font-bold uppercase tracking-tighter">Pay</span>
                            <span class="font-black text-indigo-600 text-2xl font-mono">${{s.amount.toFixed(2)}}</span>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    foreignCurrency: 'JPY', baseCurrency: 'HKD', exchangeRate: 0.05, isCustomRate: true,
                    newMember: '', members: ['我', 'Lok', 'JT'],
                    expense: { amount: null, desc: '', payer: '我', participants: ['我', 'Lok', 'JT'] },
                    history: []
                }
            },
            computed: {
                settlement() {
                    let net = {}; this.members.forEach(m => net[m] = 0);
                    this.history.forEach(r => {
                        let base = r.amount * r.rate;
                        let share = base / r.participants.length;
                        net[r.payer] += base;
                        r.participants.forEach(p => net[p] -= share);
                    });
                    let d = [], c = [];
                    for (let n in net) {
                        if (net[n] < -0.01) d.push({n, a: -net[n]});
                        else if (net[n] > 0.01) c.push({n, a: net[n]});
                    }
                    let res = [], di = 0, ci = 0;
                    while (di < d.length && ci < c.length) {
                        let p = Math.min(d[di].a, c[ci].a);
                        res.push({from: d[di].n, to: c[ci].n, amount: p});
                        d[di].a -= p; c[ci].a -= p;
                        if (d[di].a < 0.01) di++; if (c[ci].a < 0.01) ci++;
                    }
                    return res;
                }
            },
            methods: {
                addMember() { if(this.newMember) {this.members.push(this.newMember); this.newMember='';} },
                toggleParticipant(m) {
                    let i = this.expense.participants.indexOf(m);
                    i > -1 ? this.expense.participants.splice(i, 1) : this.expense.participants.push(m);
                },
                addRecord() {
                    if (!this.expense.amount) return;
                    this.history.push({...this.expense, participants:[...this.expense.participants], rate:parseFloat(this.exchangeRate)});
                    this.expense.amount = null; this.expense.desc = '';
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
