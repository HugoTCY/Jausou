<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoyagePay - 旅遊分帳神器</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2654/2654274.png">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" class="max-w-md mx-auto pb-20">
        
        <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg mb-6">
            <h1 class="text-2xl font-bold text-center">🌍 VoyagePay</h1>
            <p class="text-indigo-100 text-center text-sm">唔使帶腦旅行，我幫你計數</p>
        </header>

        <div class="px-4 space-y-6">
            
            <section class="bg-white p-5 rounded-2xl card-shadow border border-indigo-50">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-slate-700">匯率設定</h2>
                    <label class="flex items-center cursor-pointer">
                        <span class="text-xs mr-2 text-slate-400">{{ isCustomRate ? '手動模式' : '自動更新中' }}</span>
                        <div class="relative">
                            <input type="checkbox" v-model="isCustomRate" class="sr-only peer">
                            <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:bg-indigo-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                        </div>
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">去邊玩？(外幣)</label>
                        <select v-model="foreignCurrency" @change="fetchRate" :disabled="isCustomRate" class="w-full bg-slate-50 border-none rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500">
                            <option value="JPY">🇯🇵 日本 JPY</option>
                            <option value="KRW">🇰🇷 韓國 KRW</option>
                            <option value="TWD">🇹🇼 台灣 TWD</option>
                            <option value="THB">🇹🇭 泰國 THB</option>
                            <option value="EUR">🇪🇺 歐洲 EUR</option>
                            <option value="USD">🇺🇸 美國 USD</option>
                            <option value="GBP">🇬🇧 英國 GBP</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">返邊度？(本幣)</label>
                        <select v-model="baseCurrency" @change="fetchRate" :disabled="isCustomRate" class="w-full bg-slate-50 border-none rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500">
                            <option value="HKD">🇭🇰 港幣 HKD</option>
                            <option value="TWD">🇹🇼 台幣 TWD</option>
                            <option value="USD">🇺🇸 美金 USD</option>
                        </select>
                    </div>
                </div>

                <div class="relative">
                    <label class="block text-xs text-slate-400 mb-1">當前匯率 (1 {{foreignCurrency}} = ? {{baseCurrency}})</label>
                    <input type="number" v-model="exchangeRate" :readonly="!isCustomRate" 
                           :class="['w-full p-3 rounded-xl font-mono text-lg transition-colors', isCustomRate ? 'bg-yellow-50 border-2 border-yellow-200 text-yellow-700' : 'bg-slate-100 text-slate-600']" 
                           step="0.000001">
                </div>
            </section>

            <section class="bg-white p-5 rounded-2xl card-shadow">
                <h2 class="font-bold text-slate-700 mb-3">同行團友</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" v-model="newMember" @keyup.enter="addMember" placeholder="輸入名，例如：東霖" class="flex-1 bg-slate-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-indigo-500">
                    <button @click="addMember" class="bg-indigo-100 text-indigo-600 font-bold px-4 rounded-xl hover:bg-indigo-200">＋</button>
                </div>
                <div class="flex flex-wrap gap-2">
                    <transition-group name="list">
                        <span v-for="(m, index) in members" :key="m" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-sm font-medium flex items-center animate-fade-in">
                            {{ m }}
                            <button @click="removeMember(index)" class="ml-2 text-indigo-300 hover:text-red-500">✕</button>
                        </span>
                    </transition-group>
                </div>
            </section>

            <section class="bg-white p-5 rounded-2xl card-shadow">
                <h2 class="font-bold text-slate-700 mb-4">記一筆數 💸</h2>
                
                <div class="space-y-4">
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-400 font-bold text-lg">{{foreignCurrency}}</span>
                        <input type="number" v-model="expense.amount" placeholder="0.00" class="w-full bg-slate-50 border-none rounded-xl p-4 pl-16 text-2xl font-bold focus:ring-2 focus:ring-indigo-500">
                    </div>
                    
                    <input type="text" v-model="expense.desc" placeholder="買咗咩？(例如：拉麵)" class="w-full bg-slate-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-indigo-500">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">邊個畀錢？</label>
                            <select v-model="expense.payer" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm">
                                <option v-for="m in members" :value="m">{{ m }}</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">邊個分擔？</label>
                            <div class="flex flex-wrap gap-1">
                                <button v-for="m in members" @click="toggleParticipant(m)" 
                                        :class="['px-2 py-1 text-xs rounded-lg border transition-all', expense.participants.includes(m) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-slate-50 text-slate-400 border-slate-200']">
                                    {{ m }}
                                </button>
                            </div>
                        </div>
                    </div>

                    <button @click="addRecord" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-indigo-200 shadow-lg active:scale-95 transition-transform">
                        確認記錄
                    </button>
                </div>
            </section>

            <section v-if="history.length > 0" class="bg-white p-5 rounded-2xl card-shadow mb-10">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-slate-700 text-lg">找數方案 ({{baseCurrency}})</h2>
                    <button @click="clearHistory" class="text-xs text-red-400 underline">清空紀錄</button>
                </div>
                
                <div class="space-y-3">
                    <div v-for="s in settlement" class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <div class="flex items-center space-x-3">
                            <span class="font-bold text-slate-600">{{ s.from }}</span>
                            <span class="text-slate-300">➡️</span>
                            <span class="font-bold text-slate-600">{{ s.to }}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-slate-400 block font-mono">Pay him/her</span>
                            <span class="font-bold text-indigo-600 text-xl font-mono">${{ s.amount.toFixed(2) }}</span>
                        </div>
                    </div>
                </div>

                <div class="mt-6 border-t pt-4">
                    <details class="text-sm text-slate-500">
                        <summary class="cursor-pointer hover:text-indigo-600">睇返之前記咗咩 ({{history.length}} 筆)</summary>
                        <ul class="mt-2 space-y-1">
                            <li v-for="(h, i) in history" :key="i" class="flex justify-between text-xs py-1 border-b border-dotted">
                                <span>{{ h.desc || '冇名' }} ({{ h.payer }} 付)</span>
                                <span class="font-mono">{{ h.amount }}{{ foreignCurrency }}</span>
                            </li>
                        </ul>
                    </details>
                </div>
            </section>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    foreignCurrency: 'JPY',
                    baseCurrency: 'HKD',
                    exchangeRate: 0.051,
                    isCustomRate: false,
                    newMember: '',
                    members: ['我', '阿明', '阿華'],
                    expense: { amount: null, desc: '', payer: '我', participants: ['我', '阿明', '阿華'] },
                    history: []
                }
            },
            mounted() {
                this.fetchRate();
                // 嘗試從本地讀取舊資料
                const saved = localStorage.getItem('voyage_pay_history');
                if (saved) this.history = JSON.parse(saved);
                const savedMembers = localStorage.getItem('voyage_pay_members');
                if (savedMembers) this.members = JSON.parse(savedMembers);
            },
            watch: {
                isCustomRate(val) { if (!val) this.fetchRate(); },
                history: { handler(val) { localStorage.setItem('voyage_pay_history', JSON.stringify(val)); }, deep: true },
                members: { handler(val) { localStorage.setItem('voyage_pay_members', JSON.stringify(val)); }, deep: true }
            },
            computed: {
                settlement() {
                    let balances = {};
                    this.members.forEach(m => balances[m] = 0);
                    this.history.forEach(rec => {
                        const amountBase = rec.amount * rec.rateAtTime;
                        const share = amountBase / rec.participants.length;
                        balances[rec.payer] += amountBase;
                        rec.participants.forEach(p => balances[p] -= share);
                    });
                    let debtors = [], creditors = [];
                    for (let m in balances) {
                        if (balances[m] < -0.01) debtors.push({ name: m, amount: -balances[m] });
                        else if (balances[m] > 0.01) creditors.push({ name: m, amount: balances[m] });
                    }
                    let results = [];
                    let dIdx = 0, cIdx = 0;
                    while (dIdx < debtors.length && cIdx < creditors.length) {
                        let d = debtors[dIdx], c = creditors[cIdx];
                        let pay = Math.min(d.amount, c.amount);
                        results.push({ from: d.name, to: c.name, amount: pay });
                        d.amount -= pay; c.amount -= pay;
                        if (d.amount < 0.01) dIdx++;
                        if (c.amount < 0.01) cIdx++;
                    }
                    return results;
                }
            },
            methods: {
                async fetchRate() {
                    if (this.isCustomRate) return;
                    try {
                        const res = await fetch(`https://open.er-api.com/v6/latest/${this.foreignCurrency}`);
                        const data = await res.json();
                        this.exchangeRate = data.rates[this.baseCurrency].toFixed(6);
                    } catch (e) { alert("匯率更新失敗，請手動輸入"); }
                },
                addMember() {
                    if (this.newMember && !this.members.includes(this.newMember)) {
                        this.members.push(this.newMember);
                        this.newMember = '';
                    }
                },
                removeMember(i) {
                    if (confirm(`確定要移除 ${this.members[i]} 嗎？`)) this.members.splice(i, 1);
                },
                toggleParticipant(m) {
                    const idx = this.expense.participants.indexOf(m);
                    idx > -1 ? this.expense.participants.splice(idx, 1) : this.expense.participants.push(m);
                },
                addRecord() {
                    if (!this.expense.amount || this.expense.participants.length === 0) return alert("請輸入金額並選擇分擔者");
                    this.history.push({ 
                        ...this.expense, 
                        participants: [...this.expense.participants], 
                        rateAtTime: parseFloat(this.exchangeRate) 
                    });
                    this.expense.amount = null;
                    this.expense.desc = '';
                },
                clearHistory() {
                    if (confirm("確定要清空所有紀錄重新開始？")) this.history = [];
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
